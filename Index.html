<!DOCTYPE html>
<html>
<head>
    <title>Navya Portfolio</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #111;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #222;
        }

        nav {
            text-align: center;
            padding: 10px;
        }

        nav button {
            margin: 10px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: cyan;
        }

        section {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

      
        .gallery img {
            width: 200px;
            margin: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        #popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
        }

        #popup img {
            width: 400px;
            margin-top: 100px;
        }

    
        .calculator {
            text-align: center;
        }

        .calculator input {
            width: 200px;
            height: 40px;
            margin-bottom: 10px;
            text-align: right;
        }

        .calculator button {
            width: 50px;
            height: 40px;
            margin: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>Navya Portfolio</h1>
    <p>Web Developer</p>
</header>

<nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('gallery')">Gallery</button>
    <button onclick="showSection('calculator')">Calculator</button>
</nav>
<section id="home" class="active">
    <h2>Welcome</h2>
    <p>This is my portfolio with projects.</p>
</section>
<section id="gallery">
    <h2>Image Gallery</h2>

    <div class="gallery">
        <img src="https://picsum.photos/200?1" onclick="openImage(this.src)">
        <img src="https://picsum.photos/200?2" onclick="openImage(this.src)">
        <img src="https://picsum.photos/200?3" onclick="openImage(this.src)">
    </div>

    <div id="popup" onclick="closeImage()">
        <img id="popupImg">
    </div>
</section>
<section id="calculator">
    <h2>Calculator</h2>

    <div class="calculator">
        <input type="text" id="display">

        <br>
        <button onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')">/</button>
        <button onclick="appendValue('*')">*</button>

        <br>
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>

        <br>
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>

        <br>
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>

        <br>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('+')">+</button>
        <button onclick="appendValue('-')">-</button>

        <br>
        <button onclick="calculate()">=</button>
    </div>
</section>

<script>
function showSection(sectionId) {
    document.querySelectorAll("section").forEach(sec => {
        sec.classList.remove("active");
    });
    document.getElementById(sectionId).classList.add("active");
}

function openImage(src) {
    document.getElementById("popup").style.display = "block";
    document.getElementById("popupImg").src = src;
}

function closeImage() {
    document.getElementById("popup").style.display = "none";
}

let display = document.getElementById("display");

function appendValue(val) {
    display.value += val;
}

function clearDisplay() {
    display.value = "";
}

function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}
</script>

</body>
</html>
